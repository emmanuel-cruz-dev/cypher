<section class="relative dark:bg-[#0d1117] py-16 px-6 overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <svg
      class="w-full h-full opacity-5 text-black dark:text-white"
      xmlns="http://www.w3.org/2000/svg"
    >
      <line x1="0" y1="40%" x2="30%" y2="100%" class="stroke-current" stroke-width="0.5" />
      <line x1="0" y1="70%" x2="20%" y2="100%" class="stroke-current" stroke-width="0.5" />
    </svg>
  </div>

  <div class="relative z-10 max-w-6xl mx-auto">
    <header class="text-center mb-16">
      <p
        ngmMotion
        [initial]="{ opacity: 0, y: -12 }"
        [whileInView]="{ opacity: 1, y: 0 }"
        [viewport]="{ once: true, amount: 0.5 }"
        [transition]="{ duration: 0.6 }"
        class="text-xs font-semibold tracking-[0.2em] text-gray-400 uppercase mb-4"
      >
        {{ 'features.tagline' | translate }}
      </p>
      <h2
        ngmMotion
        [initial]="{ opacity: 0, y: 16 }"
        [whileInView]="{ opacity: 1, y: 0 }"
        [viewport]="{ once: true }"
        [transition]="{ duration: 0.6, delay: 0.1 }"
        class="text-4xl md:text-5xl font-bold leading-tight"
      >
        {{ 'features.title' | translate }}
        <span class="text-[#a8d8f0]">{{ 'features.titleHighlight' | translate }}</span>
      </h2>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (feature of features; track feature.key) {
      <div
        ngmMotion
        [initial]="{ opacity: 0, y: 32 }"
        [whileInView]="{ opacity: 1, y: 0 }"
        [viewport]="{ once: true, amount: 0.2 }"
        [transition]="{ duration: 0.6, delay: feature.delay }"
        class="group flex flex-col gap-5"
      >
        <figure
          class="relative flex items-center justify-start h-24 transition-transform duration-300 group-hover:-translate-y-1"
        >
          <img
            [src]="feature.image"
            [alt]="'features.' + feature.key + '.title' | translate"
            class="h-full w-auto object-contain drop-shadow-md"
            loading="lazy"
          />
        </figure>

        <div class="flex flex-col gap-2">
          <h3 class="text-lg font-bold leading-snug">
            {{ 'features.' + feature.key + '.title' | translate }}
          </h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">
            {{ 'features.' + feature.key + '.description' | translate }}
          </p>
        </div>

        <div class="h-px w-8 bg-[#a8d8f0] transition-all duration-300 group-hover:w-20"></div>
      </div>
      }
    </div>
  </div>
</section>
