<section class="relative dark:bg-[#0d1117] flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <svg
      class="w-full h-full opacity-10 text-black dark:text-white"
      xmlns="http://www.w3.org/2000/svg"
    >
      <line x1="70%" y1="0" x2="100%" y2="60%" class="stroke-current" stroke-width="0.5" />
      <line x1="100%" y1="0" x2="55%" y2="100%" class="stroke-current" stroke-width="0.5" />
      <line x1="100%" y1="30%" x2="60%" y2="100%" class="stroke-current" stroke-width="0.5" />
    </svg>
  </div>

  <div class="relative z-10 text-center py-16 px-6 max-w-4xl mx-auto">
    <p
      ngmMotion
      [initial]="{ opacity: 0, y: -20 }"
      [whileInView]="{ opacity: 1, y: 0 }"
      [viewport]="{ once: true, amount: 0.5 }"
      [transition]="{ duration: 0.8 }"
      class="text-xs font-semibold tracking-[0.2em] text-gray-400 uppercase mb-4"
    >
      {{ 'hero.tagline' | translate }}
    </p>

    <h1
      ngmMotion
      [initial]="{ opacity: 0, scale: 0.95 }"
      [whileInView]="{ opacity: 1, scale: 1 }"
      [viewport]="{ once: true }"
      [transition]="{ duration: 0.5, delay: 0.4 }"
      class="text-5xl md:text-6xl font-bold leading-tight mb-6"
    >
      {{ 'hero.title' | translate }}<br />
      <span class="text-[#a8d8f0]">{{ 'hero.titleHighlight' | translate }}</span>
    </h1>

    <p
      ngmMotion
      [initial]="{ opacity: 0 }"
      [whileInView]="{ opacity: 1 }"
      [viewport]="{ once: true }"
      [transition]="{ duration: 0.8, delay: 0.2 }"
      class="text-gray-500 dark:text-gray-400 text-base md:text-lg max-w-4xl mx-auto mb-10 leading-relaxed"
    >
      {{ 'hero.description' | translate }}
    </p>

    <footer
      ngmMotion
      [initial]="{ opacity: 0, y: 50 }"
      [whileInView]="{ opacity: 1, y: 0 }"
      [viewport]="{ once: true, amount: 0.5 }"
      [transition]="{ duration: 0.8 }"
    >
      <div
        class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-2 [&>button]:transition-colors [&>button]:duration-200 [&>button]:cursor-pointer"
      >
        <a
          routerLink="/auth/login"
          class="px-8 py-3 bg-black text-white dark:bg-white dark:text-[#0d1117] dark:border-white/10 font-semibold rounded-full hover:bg-black/80 dark:hover:bg-white/90 transition-colors duration-300"
        >
          {{ 'hero.ctaPrimary' | translate }}
        </a>
        <a
          routerLink="/contact"
          class="px-8 py-3 border border-black dark:border-white font-semibold rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors duration-300"
        >
          {{ 'hero.ctaSecondary' | translate }}
        </a>
      </div>
      <small class="text-gray-500 dark:text-gray-400 text-xs">
        {{ 'hero.disclaimer' | translate }}
      </small>
    </footer>
  </div>
</section>
