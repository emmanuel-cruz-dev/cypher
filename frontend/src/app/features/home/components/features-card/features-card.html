<article
  ngmMotion
  [initial]="{ opacity: 0, y: 32 }"
  [whileInView]="{ opacity: 1, y: 0 }"
  [viewport]="{ once: true, amount: 0.2 }"
  [transition]="{ duration: 0.6, delay: feature.delay }"
  class="group flex flex-col gap-5"
>
  <figure class="h-36 mx-auto transition-transform duration-300 group-hover:-translate-y-1 mb-2">
    <img
      [src]="feature.image"
      [alt]="'home.features.' + feature.key + '.title' | translate"
      class="h-full w-auto object-cover drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)] dark:drop-shadow-[0_10px_20px_rgba(255,255,255,0.3)]"
      loading="lazy"
    />
  </figure>

  <div class="flex flex-col gap-2">
    <h3 class="text-xl font-bold leading-snug">
      {{ 'home.features.' + feature.key + '.title' | translate }}
    </h3>
    <p class="text-base max-w-5/6 lg:max-w-none text-gray-500 dark:text-gray-400 leading-relaxed">
      {{ 'home.features.' + feature.key + '.description' | translate }}
    </p>
  </div>

  <div class="h-0.5 w-8 bg-[#a8d8f0] transition-all duration-300 group-hover:w-20"></div>
</article>
