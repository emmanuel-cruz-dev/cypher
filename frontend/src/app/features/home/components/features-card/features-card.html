<article
  ngmMotion
  [initial]="{ opacity: 0, y: 32 }"
  [whileInView]="{ opacity: 1, y: 0 }"
  [viewport]="{ once: true, amount: 0.2 }"
  [transition]="{ duration: 0.6, delay: feature.delay }"
  class="group flex flex-col gap-5"
>
  <figure
    class="relative flex items-center justify-start h-24 transition-transform duration-300 group-hover:-translate-y-1"
  >
    <img
      [src]="feature.image"
      [alt]="'features.' + feature.key + '.title' | translate"
      class="h-full w-auto object-contain drop-shadow-md"
      loading="lazy"
    />
  </figure>

  <div class="flex flex-col gap-2">
    <h3 class="text-lg font-bold leading-snug">
      {{ 'features.' + feature.key + '.title' | translate }}
    </h3>
    <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">
      {{ 'features.' + feature.key + '.description' | translate }}
    </p>
  </div>

  <div class="h-px w-8 bg-[#a8d8f0] transition-all duration-300 group-hover:w-20"></div>
</article>
