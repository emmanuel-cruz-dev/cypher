<header
  class="sticky top-0 z-50 flex h-16 items-center gap-2 border-b border-black/8 bg-white dark:bg-black px-4 md:px-6"
>
  <a routerLink="/" class="flex shrink-0 items-center gap-2.5 mr-4 text-inherit no-underline">
    <figure class="flex h-8 w-8 items-center justify-center shadow-lg rounded-full">
      <img
        src="assets/images/logos/cypher-logo.avif"
        alt="Cypher logo"
        class="w-full h-full object-cover"
        width="100"
        height="100"
      />
    </figure>

    <span class="text-[17px] font-medium tracking-tight text-gray-900 dark:text-gray-300"
      >Cypher</span
    >
  </a>

  <nav class="hidden md:flex items-center gap-1" [attr.aria-label]="'aria.mainNav' | translate">
    @for (link of links; track link.route) {
    <a
      [routerLink]="link.route"
      routerLinkActive="!text-violet-700 !font-medium bg-violet-50"
      [routerLinkActiveOptions]="{ exact: link.route === '/' }"
      class="relative rounded-lg px-3 py-1.5 text-sm font-normal text-gray-500 dark:text-gray-300 transition-colors hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-gray-900"
      matRipple
      [matRippleColor]="'rgba(0,0,0,0.04)'"
    >
      {{ link.label | translate }}
    </a>
    }
  </nav>

  <span class="flex-1"></span>

  <a
    routerLink="/auth/login"
    class="hidden md:inline-flex items-center gap-1.5 rounded-lg bg-violet-700 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-violet-800"
    matRipple
    [matRippleColor]="'rgba(255,255,255,0.12)'"
    [attr.aria-label]="'aria.login' | translate"
  >
    <mat-icon class="text-[16px]! w-4! h-4!">login</mat-icon>
    {{ 'nav.login' | translate }}
  </a>

  <button
    mat-icon-button
    (click)="langService.toggleLanguage()"
    class="flex items-center justify-center text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors"
    [attr.aria-label]="'aria.toggleLang' | translate"
    [title]="'aria.toggleLang' | translate"
  >
    <span
      class="flex h-full w-full items-center justify-center text-xs font-semibold tracking-wide leading-none"
    >
      {{ langService.currentLang() === 'es' ? 'EN' : 'ES' }}
    </span>
  </button>

  <button
    mat-icon-button
    (click)="themeService.toggleTheme()"
    class="inline-flex text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors"
    [attr.aria-label]="'aria.toggleTheme' | translate"
  >
    <mat-icon>{{ themeService.isDarkTheme() ? 'dark_mode' : 'light_mode' }}</mat-icon>
  </button>

  <button
    (click)="toggleDrawer()"
    class="flex md:hidden items-center justify-center w-9 h-9 rounded-lg text-gray-500 dark:text-gray-300 hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-gray-900 dark:hover:text-gray-300 transition-colors cursor-pointer"
    [attr.aria-label]="'aria.openMenu' | translate"
  >
    <mat-icon>{{ drawerOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>
</header>

@if (drawerOpen()) {
<div
  class="fixed inset-0 z-40 bg-black/30 md:hidden"
  (click)="toggleDrawer()"
  aria-hidden="true"
></div>

<aside
  class="fixed inset-y-0 left-0 z-50 flex w-72 flex-col bg-white dark:bg-black shadow-xl md:hidden"
>
  <div class="flex h-16 shrink-0 items-center gap-2.5 border-b border-black/8 px-4">
    <figure class="flex h-8 w-8 items-center justify-center shadow-lg rounded-full">
      <img
        src="assets/images/logos/cypher-logo.avif"
        alt="Cypher logo"
        class="w-full h-full object-cover"
      />
    </figure>
    <span class="text-[17px] font-medium tracking-tight text-gray-900 dark:text-gray-300"
      >Cypher</span
    >
    <button
      (click)="toggleDrawer()"
      class="ml-auto flex items-center justify-center w-9 h-9 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition-colors cursor-pointer"
      [attr.aria-label]="'aria.closeMenu' | translate"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <nav
    class="flex flex-col gap-1 overflow-y-auto p-3"
    [attr.aria-label]="'aria.mobileMenu' | translate"
  >
    @for (link of links; track link.route) {
    <a
      [routerLink]="link.route"
      routerLinkActive="bg-violet-50 text-violet-700 font-medium"
      [routerLinkActiveOptions]="{ exact: link.route === '/' }"
      (click)="toggleDrawer()"
      class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900"
      matRipple
    >
      <mat-icon fontSet="material-icons-outlined" class="text-[20px]! w-5! h-5! shrink-0">{{
        link.icon
      }}</mat-icon>
      {{ link.label | translate }}
    </a>
    }
  </nav>

  <div class="mt-auto border-t border-black/8 p-4">
    <a
      routerLink="/auth/login"
      (click)="toggleDrawer()"
      class="flex w-full items-center justify-center gap-2 rounded-lg bg-violet-700 py-2.5 text-sm font-medium text-white transition-colors hover:bg-violet-800"
      matRipple
      [matRippleColor]="'rgba(255,255,255,0.12)'"
    >
      <mat-icon class="text-[18px]! w-4.5! h-4.5!">login</mat-icon>
      {{ 'nav.login' | translate }}
    </a>
  </div>
</aside>
}
